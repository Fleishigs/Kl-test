<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - KosherLynk</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="nav">
        <div class="nav-container">
            <a href="/" class="logo">
                <svg viewBox="0 0 40 40" class="logo-icon">
                    <rect x="8" y="5" width="24" height="30" rx="4" fill="currentColor"/>
                    <rect x="12" y="9" width="16" height="18" rx="2" fill="white"/>
                    <circle cx="20" cy="31" r="2" fill="white"/>
                </svg>
                <span>KosherLynk</span>
            </a>
            <div class="nav-links">
                <a href="/products">Products</a>
                <a href="/contact">Contact</a>
            </div>
        </div>
    </nav>

    <main>
        <section class="auth-section">
            <div class="auth-container">
                <div class="auth-card">
                    <h1>Welcome Back</h1>
                    <p class="auth-subtitle">Log in to view your orders and manage your account</p>

                    <form id="login-form" class="auth-form">
                        <div class="form-group">
                            <label for="email">Email</label>
                            <input 
                                type="email" 
                                id="email" 
                                name="email" 
                                required 
                                placeholder="your@email.com"
                                autocomplete="email"
                            >
                        </div>

                        <div class="form-group">
                            <label for="password">Password</label>
                            <input 
                                type="password" 
                                id="password" 
                                name="password" 
                                required 
                                placeholder="Enter your password"
                                autocomplete="current-password"
                                minlength="8"
                            >
                        </div>

                        <div id="error-message" class="error-message" style="display: none;"></div>

                        <button type="submit" class="btn btn-primary btn-full" id="login-btn">
                            Log In
                        </button>
                    </form>

                    <div class="auth-footer">
                        <p>Don't have an account? <a href="/signup">Sign up</a></p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-brand">
                    <div class="logo">
                        <svg viewBox="0 0 40 40" class="logo-icon">
                            <rect x="8" y="5" width="24" height="30" rx="4" fill="currentColor"/>
                            <rect x="12" y="9" width="16" height="18" rx="2" fill="white"/>
                            <circle cx="20" cy="31" r="2" fill="white"/>
                        </svg>
                        <span>KosherLynk</span>
                    </div>
                    <p>Simple phones for intentional living</p>
                </div>
            </div>
            <div class="footer-bottom">
                <p>&copy; 2024 KosherLynk. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="login.js"></script>
</body>
</html>
